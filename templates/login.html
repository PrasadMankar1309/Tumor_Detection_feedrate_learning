{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block page_title %}Doctor Login{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height: 70vh; align-items: center;">
  <div class="col-md-5 col-lg-4">
    <div class="glass-card animate-card text-center" style="padding: 40px 32px;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 10px 25px -5px rgba(79,70,229,0.4);">
        <i class="fas fa-brain" style="font-size:28px;color:#fff;"></i>
      </div>
      <h3 style="font-weight:700;margin-bottom:6px;">Welcome Back, Doctor</h3>
      <p class="text-muted" style="margin-bottom:24px;">Sign in to the NeuroScan AI Platform</p>

      {% if error %}
      <div class="alert-custom alert-danger-custom mb-3">
        <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login_submit') }}">
        <div style="margin-bottom:16px;text-align:left;">
          <label class="form-label-custom">Email Address</label>
          <div class="input-group-custom">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-input-custom" name="email" placeholder="admin@test.com" required/>
          </div>
        </div>
        <div style="margin-bottom:24px;text-align:left;">
          <label class="form-label-custom">Password</label>
          <div class="input-group-custom">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-input-custom" name="password" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom" style="width:100%;padding:14px;font-size:16px;font-weight:700;border-radius:12px;">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In Securely
        </button>
      </form>

      <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border-color);">
        <p class="text-muted" style="font-size:13px;margin:0;">
          Demo: <strong>admin@test.com</strong> / <strong>admin123</strong>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
