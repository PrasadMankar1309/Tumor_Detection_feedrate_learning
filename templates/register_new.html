<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NeuroScan AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; }
        h1 { color: #333; text-align: center; margin-bottom: 30px; font-size: 28px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-row .form-group { margin-bottom: 0; }
        .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 12px; border: 2px solid #e0e0e0; background: white; border-radius: 8px; cursor: pointer; font-weight: 600; color: #555; transition: all 0.3s; }
        .tab-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .doctor-fields { display: none; }
        .doctor-fields.active { display: block; }
        .patient-fields { display: block; }
        .patient-fields.active { display: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.3s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); }
        .link { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
        .link a { color: #667eea; text-decoration: none; font-weight: 600; }
        .error { color: #dc3545; font-size: 14px; margin-top: 5px; display: none; }
        .success { color: #28a745; font-size: 14px; margin-top: 5px; display: none; }
        .loading { display: none; text-align: center; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 NeuroScan AI</h1>
        <h2 style="text-align: center; color: #667eea; font-size: 18px; margin-bottom: 25px;">Create Account</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchRole('doctor')">Doctor</button>
            <button class="tab-btn" onclick="switchRole('patient')">Patient</button>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <!-- Common Fields -->
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="your.email@example.com">
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="At least 8 characters">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="+1-555-0123">
            </div>

            <!-- Doctor Fields -->
            <div class="doctor-fields active">
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" id="specialization" placeholder="Neurology, Radiology, etc.">
                </div>

                <div class="form-group">
                    <label>License Number</label>
                    <input type="text" id="licenseNumber" placeholder="Your medical license number">
                </div>

                <div class="form-group">
                    <label>Hospital/Clinic Name</label>
                    <input type="text" id="hospitalName" placeholder="City Medical Center">
                </div>
            </div>

            <!-- Patient Fields -->
            <div class="patient-fields">
                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" min="1" max="120" placeholder="35">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Medical History (Optional)</label>
                    <textarea id="medicalHistory" placeholder="e.g., Hypertension, Diabetes..." rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>Allergies (Optional)</label>
                    <input type="text" id="allergies" placeholder="e.g., Penicillin, Aspirin">
                </div>
            </div>

            <button type="submit" id="submitBtn">Create Account</button>
            <div class="loading" id="loading">⏳ Creating your account...</div>
            <div class="error" id="generalError"></div>
            <div class="success" id="successMsg"></div>
        </form>

        <div class="link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        let currentRole = 'doctor';

        function switchRole(role) {
            currentRole = role;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (role === 'doctor') {
                document.querySelector('.doctor-fields').classList.add('active');
                document.querySelector('.patient-fields').classList.remove('active');
            } else {
                document.querySelector('.doctor-fields').classList.remove('active');
                document.querySelector('.patient-fields').classList.add('active');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const generalError = document.getElementById('generalError');
            const successMsg = document.getElementById('successMsg');

            submitBtn.style.display = 'none';
            loading.style.display = 'block';
            generalError.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                const formData = {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    full_name: document.getElementById('fullName').value,
                    role: currentRole,
                    phone: document.getElementById('phone').value
                };

                if (currentRole === 'doctor') {
                    formData.specialization = document.getElementById('specialization').value;
                    formData.license_number = document.getElementById('licenseNumber').value;
                    formData.hospital_name = document.getElementById('hospitalName').value;
                } else {
                    formData.age = parseInt(document.getElementById('age').value);
                    formData.gender = document.getElementById('gender').value;
                    formData.medical_history = document.getElementById('medicalHistory').value;
                    formData.allergies = document.getElementById('allergies').value;
                }

                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    successMsg.textContent = `✅ Registration successful! Redirecting to login...`;
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    generalError.textContent = `❌ ${data.error}`;
                    generalError.style.display = 'block';
                    submitBtn.style.display = 'block';
                    loading.style.display = 'none';
                }
            } catch (error) {
                generalError.textContent = `❌ Error: ${error.message}`;
                generalError.style.display = 'block';
                submitBtn.style.display = 'block';
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
