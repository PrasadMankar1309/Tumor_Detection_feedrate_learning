<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Registration | NeuroScan AI</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="auth-body d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="auth-container glass-panel fade-in-up" style="max-width: 500px;">
        <div class="text-center mb-4">
            <div class="logo-icon-large mx-auto mb-3"><i class="fas fa-stethoscope"></i></div>
            <h3 class="fw-bold">Medical Staff Registration</h3>
            <p class="text-secondary-color">Create an account to access the AI diagnosis platform.</p>
        </div>

        <div id="authError" class="alert alert-danger custom-alert d-none">
            <i class="fas fa-exclamation-triangle me-2"></i> <span id="authErrorMsg"></span>
        </div>
        
        <div id="authSuccess" class="alert alert-success custom-alert d-none">
            <i class="fas fa-check-circle me-2"></i> Registration successful! Redirecting...
        </div>

        <form id="registerForm">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label text-muted fw-semibold small text-uppercase">Full Name</label>
                    <div class="input-group-custom">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-control-custom" id="fullName" placeholder="Dr. Sarah Jenkins" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted fw-semibold small text-uppercase">Specialization</label>
                    <div class="input-group-custom">
                        <i class="fas fa-brain input-icon"></i>
                        <input type="text" class="form-control-custom" id="specialization" placeholder="Neurology" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted fw-semibold small text-uppercase">Hospital / Clinic Name</label>
                <div class="input-group-custom">
                    <i class="fas fa-hospital input-icon"></i>
                    <input type="text" class="form-control-custom" id="hospitalName" placeholder="Central City Medical" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted fw-semibold small text-uppercase">Email Address</label>
                <div class="input-group-custom">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" class="form-control-custom" id="email" placeholder="doctor@hospital.com" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted fw-semibold small text-uppercase">Create Password</label>
                <div class="input-group-custom">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" class="form-control-custom" id="password" placeholder="••••••••" minlength="6" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 py-3 rounded-3 fw-bold mt-2" id="registerBtn">
                <span id="registerBtnText">Create Account</span>
                <span id="registerSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
            </button>
        </form>

        <div class="text-center mt-4 pt-3 border-top border-dark-subtle">
            <p class="text-secondary-color">Already have an account? <a href="{{ url_for('login') }}" class="text-accent fw-bold text-decoration-none">Sign In</a></p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Config & Logic -->
    <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
